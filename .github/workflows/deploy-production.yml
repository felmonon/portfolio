name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 22
  VERCEL_ORG_ID: team_AR0EczaEZNOZ2pV96JL2zZCO
  VERCEL_PROJECT_ID: prj_ZqMESKTy7LGYJtFf67ydgfQYbUOq
  VERCEL_CLI_VERSION: 50.34.1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Pull Vercel project settings
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: npx vercel@${{ env.VERCEL_CLI_VERSION }} deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
